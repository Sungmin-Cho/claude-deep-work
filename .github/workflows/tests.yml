name: Tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    name: tests (${{ matrix.os }})
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Show bash version (M5.5 #4 — bash 3.2 visibility)
        run: bash --version

      - name: Run full Node test suite
        run: npm test

      - name: Run bash regression scripts (phase-guard / migrate / notify / recommender)
        run: |
          bash hooks/scripts/test/test-no-notification-trigger.sh
          bash hooks/scripts/test/test-recommender-integration.sh
          bash hooks/scripts/test/test-v6.4.2-regression.sh

      - name: Shellcheck hooks (advisory)
        continue-on-error: true
        shell: bash
        run: |
          set +e
          if ! command -v shellcheck >/dev/null 2>&1; then
            echo "shellcheck not installed on this runner; skipping advisory step"
            exit 0
          fi
          count=$(find hooks/scripts -type f -name '*.sh' | wc -l | tr -d ' ')
          if [ "$count" -eq 0 ]; then
            echo "no hook scripts found; skipping"
            exit 0
          fi
          echo "running shellcheck on $count files"
          find hooks/scripts -type f -name '*.sh' -print0 \
            | xargs -0 shellcheck --severity=warning --external-sources
